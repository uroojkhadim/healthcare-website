<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePlus | Modern Healthcare Center</title>
    <!-- Google Fonts: Segoe UI (System default) - Using Outfit as a premium alternative if Segoe isn't available via webfont -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Mobile Header (Visible < 768px) -->
    <header class="mobile-header">
        <button class="menu-toggle" id="menu-toggle">
            <i class="fas fa-bars"></i>
        </button>
        <div class="logo">
            <i class="fas fa-heart-pulse"></i>
            <span>CarePlus</span>
        </div>
        <div class="user-action">
            <i class="fas fa-user-circle"></i>
        </div>
    </header>

    <!-- Sidebar Overlay (Mobile backdrop) -->
    <div class="overlay" id="sidebar-overlay"></div>

    <!-- Sidebar Container -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="close-sidebar" id="close-sidebar">
                <i class="fas fa-times"></i>
            </button>
            <div class="logo">
                <i class="fas fa-heart-pulse"></i>
                <span class="logo-text">CarePlus</span>
            </div>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item active" data-page="home">
                    <a href="#"><i class="fas fa-home"></i> <span class="menu-text">Home</span></a>
                </li>
                <li class="nav-item" data-page="about">
                    <a href="#"><i class="fas fa-info-circle"></i> <span class="menu-text">About</span></a>
                </li>
                <li class="nav-item" data-page="doctors">
                    <a href="#"><i class="fas fa-user-md"></i> <span class="menu-text">Doctors</span></a>
                </li>
                <li class="nav-item" data-page="services">
                    <a href="#"><i class="fas fa-stethoscope"></i> <span class="menu-text">Services</span></a>
                </li>
                <li class="nav-item" data-page="appointment">
                    <a href="#"><i class="fas fa-calendar-check"></i> <span class="menu-text">Appointment</span></a>
                </li>
                <li class="nav-item" data-page="contact">
                    <a href="#"><i class="fas fa-phone-alt"></i> <span class="menu-text">Contact</span></a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="emergency-badge">
                <i class="fas fa-ambulance"></i>
                <span class="emergency-text">Emergency: 911</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div id="content-container" class="content-wrapper">
            <!-- Dynamic content will be injected here -->
        </div>

        <!-- Developer Credit Footer -->
        <footer class="main-footer">
            <div class="footer-content">
                <p><i class="fas fa-code"></i> Developed by Urooj Khadim</p>
                <a href="mailto:uroojkhadim505@gmail.com" class="footer-email">
                    <i class="fas fa-envelope"></i> uroojkhadim505@gmail.com
                </a>
            </div>
        </footer>
    </main>

    <!-- JavaScript Injection -->
    <script src="js/script.js"></script>
</body>
</html>
