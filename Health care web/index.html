<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarePlus | Modern Healthcare Center</title>
    <!-- Google Fonts: Segoe UI (System default) - Using Outfit as a premium alternative if Segoe isn't available via webfont -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Sidebar Container -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-heart-pulse"></i>
                <span>CarePlus</span>
            </div>
        </div>

        <nav class="nav-menu">
            <ul>
                <li class="nav-item active" data-page="home">
                    <a href="#"><i class="fas fa-home"></i> <span>Home</span></a>
                </li>
                <li class="nav-item" data-page="about">
                    <a href="#"><i class="fas fa-info-circle"></i> <span>About</span></a>
                </li>
                <li class="nav-item" data-page="doctors">
                    <a href="#"><i class="fas fa-user-md"></i> <span>Doctors</span></a>
                </li>
                <li class="nav-item" data-page="services">
                    <a href="#"><i class="fas fa-stethoscope"></i> <span>Services</span></a>
                </li>
                <li class="nav-item" data-page="appointment">
                    <a href="#"><i class="fas fa-calendar-check"></i> <span>Appointment</span></a>
                </li>
                <li class="nav-item" data-page="contact">
                    <a href="#"><i class="fas fa-phone-alt"></i> <span>Contact</span></a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="emergency-badge">
                <i class="fas fa-ambulance"></i>
                <span>Emergency: 911</span>
            </div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
        <div id="content-container" class="content-wrapper">
            <!-- Dynamic content will be injected here -->
        </div>
    </main>

    <!-- JavaScript Injection -->
    <script src="js/script.js"></script>
</body>
</html>
